  .gender-btn {
    width: 130px; padding: 24px 10px 20px; border-radius: 16px; border: 2px solid #333;

    display: flex; flex-direction: column; align-items: center; gap: 8px;

  .gender-btn .label { font-size: 16px; font-weight: 600; color: #ccc; }
  .start-btn {
    padding: 14px 50px; border-radius: 30px; border: none;
    background: linear-gradient(135deg, #ff6b6b, #ff8e53); color: #fff;

    display: none;

  .start-btn.show { display: inline-block; animation: fadeIn .5s; }

  /* ===== 游戏页 ===== */
  .game-screen { display: none; flex-direction: column; min-height: 100vh; }

  /* 顶部栏 */
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; background: #12121a; border-bottom: 1px solid #222;
    position: sticky; top: 0; z-index: 100;
  }
  .top-left { display: flex; align-items: center; gap: 10px; }

  .heart-val { color: #ff6b6b; font-weight: 700; font-size: 14px; }
  .round-val { color: #ffd93d; font-weight: 700; font-size: 14px; }

  .chat-area {

    display: flex; flex-direction: column; gap: 4px;
  }

  .typing-indicator {

    background: #1e1e2e; border-radius: 18px; width: fit-content; margin-bottom: 8px;
  }
  .typing-indicator span {
    width: 6px; height: 6px; background: #666; border-radius: 50%;
    animation: typing 1.4s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: .2s; }
  .typing-indicator span:nth-child(3) { animation-delay: .4s; }

  .bubble-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 6px; }
  .bubble-row.mom { flex-direction: row; }
  .bubble-row.me { flex-direction: row-reverse; }
  .bubble-content { max-width: 75%; }
  .bubble-label { font-size: 11px; color: #888; margin-bottom: 2px; padding: 0 4px; }
  .bubble-row.me .bubble-label { text-align: right; }

  .bubble.mom { background: #1e1e2e; color: #e0e0e0; border-bottom-left-radius: 6px; }
  .bubble.me { background: #2d4a3e; color: #d4edda; border-bottom-right-radius: 6px; }

  .bottom-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: space-around; align-items: center;
    padding: 14px 10px; background: #0d0d18; border-top: 1px solid #222;

  .ending-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 30px 20px; text-align: center; }

// ===== 核心逻辑 =====
function selectGender(g, btn) {
  gender = g;
  document.querySelectorAll('.gender-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('startBtn').classList.add('show');
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';
  currentNode = 'start';
  heart = 100;
  round = 1;
  document.getElementById('heartVal').textContent = heart;
  document.getElementById('roundVal').textContent = round;
  document.getElementById('chatArea').innerHTML = '<div class="typing-indicator" id="typing"><span></span><span></span><span></span></div>';
  document.getElementById('choicesArea').innerHTML = '';
  showTyping();
}

function showTyping() {
  var typing = document.getElementById('typing');
  typing.style.display = 'flex';
  setTimeout(function() {
    typing.style.display = 'none';
    renderNode(currentNode);
  }, 1500);
}

function renderNode(nodeId) {
  var node = story[nodeId];
  if (!node) return;

  var chatArea = document.getElementById('chatArea');
  var choicesArea = document.getElementById('choicesArea');

  // 添加妈妈的气泡
  var row = document.createElement('div');
  row.className = 'bubble-row mom';
  row.innerHTML =
    '<div class="avatar" style="font-size:16px;width:32px;height:32px;">&#x1F469;</div>' +
    '<div class="bubble-content">' +
      '<div class="bubble-label">' + node.speaker + '</div>' +
      '<div class="bubble mom">' + node.text + '</div>' +
    '</div>';
  chatArea.appendChild(row);

  // 更新回合
  document.getElementById('roundVal').textContent = round;
  round++;

  // 显示选项
  choicesArea.innerHTML = '';
  choicesArea.style.display = 'flex';
  for (var i = 0; i < node.choices.length; i++) {
    (function(choice) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice.text;
      btn.onclick = function() { chooseOption(choice, nodeId); };
      choicesArea.appendChild(btn);
    })(node.choices[i]);
  }

  // 滚动到底部
  setTimeout(function() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }, 100);
}

function chooseOption(choice, fromNode) {
  var chatArea = document.getElementById('chatArea');
  var choicesArea = document.getElementById('choicesArea');

  // 隐藏选项
  choicesArea.style.display = 'none';

  // 添加玩家的气泡
  var row = document.createElement('div');
  row.className = 'bubble-row me';
  row.innerHTML =
    '<div class="bubble-content">' +
      '<div class="bubble-label" style="color:#888;">我</div>' +
      '<div class="bubble me">' + choice.text + '</div>' +
    '</div>' +
    '<div class="avatar" style="font-size:16px;width:32px;height:32px;background:#2d4a3e;">&#x1F466;</div>';
  chatArea.appendChild(row);

  // 更新孝心值
  if (fromNode === 'r5_exposed' && choice.next === 'ending_rebel') {
    heart -= 50;
  } else if (fromNode === 'r4_c' || fromNode === 'r5_half') {
    heart -= 5;
  } else if (fromNode === 'r5_deny') {
    heart += 5;
  }
  document.getElementById('heartVal').textContent = Math.max(0, heart);

  // 滚动
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

  // 判断是结局还是下一轮
  if (choice.next.indexOf('ending_') === 0) {
    setTimeout(function() { showEnding(choice.next); }, 800);
  } else {
    currentNode = choice.next;
    setTimeout(function() {
      var typing = document.getElementById('typing');
      typing.style.display = 'flex';
      setTimeout(function() {
        typing.style.display = 'none';
        renderNode(currentNode);
      }, 1500);
    }, 500);
  }
}

function showEnding(endingId) {
  document.getElementById('gameScreen').style.display = 'none';
  var endingScreen = document.getElementById('endingScreen');
  endingScreen.style.display = 'flex';

  var e = endings[endingId];
  document.getElementById('endingEmoji').textContent = e.emoji;
  document.getElementById('endingName').textContent = e.name;
  document.getElementById('endingDesc').textContent = e.desc;
  document.getElementById('endingRank').textContent = '\u51FB\u8D25\u4E86\u5168\u56FD ' + e.rank + ' \u7684\u5927\u5B66\u751F';
}
