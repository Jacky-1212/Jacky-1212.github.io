</head>

        os: "被她看穿了……",
        choices: [
            { text: "不会的不会的，我有计划", nextNode: "ending_earphone", isEnding: true, genderEnding: 'earphone_or_skincare' },
            { text: "其实……可能还是有点悬", nextNode: "ending_keyboard", isEnding: true, genderEnding: 'keyboard_or_coat' },
            { text: "妈，您就这么不相信我？", nextNode: "ending_cotton", isEnding: true }
        ]
    };
    storyNodes['r7c'] = {
        speaker: "👩 母后大人",
        text: "哎哟，还跟妈撒娇呢？好啦好啦，妈当然相信你。不过你要是真缺钱，一定要跟我说，别自己扛着。",
        os: "她居然没生气……",
        choices: [
            { text: "谢谢妈！我最爱你了❤️", nextNode: "ending_cotton", isEnding: true },
            { text: "嗯嗯，我知道啦", nextNode: "ending_cotton", isEnding: true },
            { text: "那……能给我转点钱吗？", nextNode: "ending_earphone", isEnding: true, genderEnding: 'earphone_or_skincare' }

    // ===== ★★★ 以上是你可以修改的剧情数据，下面引擎代码不要动 ★★★ =====
    // ================================================================

    function getGenderEnding(t) {
        if(t==='earphone_or_skincare') return gender==='male'?'ending_earphone':'ending_skincare';
        if(t==='keyboard_or_coat') return gender==='male'?'ending_keyboard':'ending_coat';
        return t;
    }
    function getChoices(n) {
        if(n.genderChoices){
            if(gender==='male'&&n.choicesMale) return n.choicesMale;
            if(gender==='female'&&n.choicesFemale) return n.choicesFemale;
            return n.choicesMale||n.choicesFemale||[];
        }
        return n.choices||[];
    }
    function getText(n) {
        if(n.textMale&&gender==='male') return n.textMale;
        if(n.textFemale&&gender==='female') return n.textFemale;
        return n.text||'';
    }
    function updTop(){ heartDisp.textContent=heart; roundDisp.textContent=round; }
    function float(c){ if(!c)return; var e=document.createElement('div'); e.className='heart-float'; e.textContent=(c>=0?'+':'')+c+' ❤️'; e.style.color=c>=0?'#4caf50':'#ff4444'; document.body.appendChild(e); setTimeout(function(){e.remove()},1600); }
    function scrol(){ setTimeout(function(){chat.scrollTop=chat.scrollHeight},80); }
    function addBub(s,t,p){
        var r=document.createElement('div'); r.className='bubble-row '+(p?'me':'mom');
        var b=document.createElement('div'); b.className='bubble '+(p?'me':'mom');
        var l=document.createElement('span'); l.className='label'; l.textContent=p?'我':s; b.appendChild(l);
        var ts=document.createElement('span'); ts.textContent=t; b.appendChild(ts); r.appendChild(b); chat.appendChild(r); scrol(); return r;
    }
    function addTyp(){ var r=document.createElement('div'); r.className='bubble-row mom'; r.id='typing'; var b=document.createElement('div'); b.className='bubble mom typing'; for(var i=0;i<3;i++){var d=document.createElement('span');d.className='dot';b.appendChild(d)} r.appendChild(b); chat.appendChild(r); scrol(); }
    function remTyp(){ var x=document.getElementById('typing'); if(x)x.remove(); }
    function addOs(o){ if(!o)return; var d=document.createElement('div'); d.className='os'; d.textContent=o; chat.appendChild(d); scrol(); }
    function remCh(){ var c=document.getElementById('curChoices'); if(c)c.remove(); }
    function hdlClk(i,ch){
        if(isProcessing)return; isProcessing=true; var c=ch[i];
        addBub('我',c.text,true); remCh();
        if(typeof c.heartChange!=='undefined'){ var oh=heart; heart+=c.heartChange; if(heart<0)heart=0; if(heart>200)heart=200; var df=heart-oh; if(df)float(df); }
        updTop();
        if(c.isEnding){
            var fid; if(c.genderEnding)fid=getGenderEnding(c.genderEnding); else fid=c.nextNode;
            setTimeout(function(){showEnd(fid);isProcessing=false},1400); return;
        }
        setTimeout(function(){addTyp();setTimeout(function(){remTyp();proc(c.nextNode);isProcessing=false},1800)},500);
    }
    function proc(id){
        currentNode=id; round+=1; var n=storyNodes[id]; if(!n){console.error('Missing node: '+id);isProcessing=false;return;}
        var txt=getText(n); addBub(n.speaker,txt,false);
        if(n.os)setTimeout(function(){addOs(n.os)},350);
        updTop(); var ch=getChoices(n); setTimeout(function(){rend(ch)},550);
    }
    function rend(ch){
        remCh(); var con=document.createElement('div'); con.className='choices'; con.id='curChoices';
        for(var i=0;i<ch.length;i++){
            var b=document.createElement('button'); b.className='choice-btn'; b.textContent=ch[i].text;
            (function(idx,carr){b.addEventListener('click',function(){if(isProcessing)return;hdlClk(idx,carr)})})(i,ch);
            con.appendChild(b);
        }
        chat.appendChild(con); scrol();
    }
    function showEnd(id){
        var en=endings[id]||endings['ending_giveup']; updTop();
        var h='<div class="emoji">'+en.emoji+'</div><div class="name">'+en.name+'</div><div class="desc">'+en.desc+'</div><div class="rank">击败了全国 '+en.rank+' 的大学生</div><button class="replay-btn" id="replayBtn">再来一次</button>';
        endingC.innerHTML=h; endingO.classList.remove('hidden');
        setTimeout(function(){var rb=document.getElementById('replayBtn');if(rb)rb.addEventListener('click',reset)},130); scrol();
    }
    function reset(){
        heart=100;round=1;currentNode='r1';isProcessing=false;gender=null;
        updTop();chat.innerHTML='';endingO.classList.add('hidden');endingC.innerHTML='';intro.classList.remove('hidden');
        btnM.classList.remove('selected');btnF.classList.remove('selected');startBtn.classList.remove('visible');chat.scrollTop=0;
    }
    function startG(){if(!gender)return;intro.classList.add('hidden');chat.innerHTML='';heart=100;round=1;currentNode='r1';isProcessing=false;updTop();proc('r1');}
    btnM.addEventListener('click',function(){if(isProcessing&&gender)return;gender='male';btnM.classList.add('selected');btnF.classList.remove('selected');startBtn.classList.add('visible')});
    btnF.addEventListener('click',function(){if(isProcessing&&gender)return;gender='female';btnF.classList.add('selected');btnM.classList.remove('selected');startBtn.classList.add('visible')});
    startBtn.addEventListener('click',function(){if(!gender)return;if(startBtn.classList.contains('visible'))startG()});
    (function init(){updTop();chat.innerHTML='';intro.classList.remove('hidden');endingO.classList.add('hidden');btnM.classList.remove('selected');btnF.classList.remove('selected');startBtn.classList.remove('visible');gender=null;heart=100;round=1;currentNode='r1';isProcessing=false})();
    document.addEventListener('touchmove',function(e){},{passive:true});
})();
</script>
