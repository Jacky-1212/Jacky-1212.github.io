/* 开场页 */

.time-display { font-size: 72px; font-weight: 300; color: #ffffff; letter-spacing: 4px; margin-bottom: 10px; }

.desc { font-size: 14px; color: #555; margin-bottom: 50px; }
.gender-select { display: flex; gap: 30px; margin-bottom: 40px; }
.gender-btn { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #333; background: #1a1a2e; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #ccc; cursor: pointer; transition: all 0.3s; }
.gender-btn:hover { border-color: #ffd700; color: #ffd700; transform: scale(1.05); }
.gender-btn.selected { border-color: #ffd700; color: #ffd700; background: #2a2a3e; }
.start-btn { padding: 14px 50px; font-size: 16px; background: linear-gradient(135deg, #ffd700, #ff8c00); color: #0a0a0f; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; transition: transform 0.2s; display: none; }

/* 游戏页 */

.top-bar-name { font-size: 14px; color: #ccc; }
.top-bar-status { font-size: 11px; color: #4caf50; }
.top-bar-right { display: flex; align-items: center; gap: 12px; font-size: 13px; }
.heart-value { color: #ff6b6b; }
.round-info { color: #888; }
.chat-container { margin-top: 56px; padding: 16px; padding-bottom: 120px; overflow-y: auto; height: calc(100vh - 56px); }
.message { margin-bottom: 16px; display: flex; flex-direction: column; }
.message.mom { align-items: flex-start; }
.message.me { align-items: flex-end; }
.bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
.message.mom .bubble { background: #1a1a2e; color: #e0e0e0; border-bottom-left-radius: 4px; }
.message.me .bubble { background: #2d5a27; color: #fff; border-bottom-right-radius: 4px; }
.typing-indicator { display: none; margin-bottom: 16px; align-items: flex-start; }
.typing-dots { background: #1a1a2e; padding: 12px 16px; border-radius: 18px; border-bottom-left-radius: 4px; }
.typing-dots span { display: inline-block; width: 8px; height: 8px; background: #666; border-radius: 50%; margin: 0 2px; animation: typing 1.4s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }
.choices-container { position: fixed; bottom: 0; left: 0; right: 0; background: #111118; border-top: 1px solid #1a1a2e; padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); z-index: 100; }
.choice-btn { display: block; width: 100%; padding: 14px 16px; margin-bottom: 8px; background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 12px; color: #e0e0e0; font-size: 15px; cursor: pointer; text-align: left; transition: all 0.2s; }
.choice-btn:last-child { margin-bottom: 0; }
.choice-btn:hover { border-color: #ffd700; background: #1a1a3e; }
.choice-btn:active { transform: scale(0.98); }

/* 结局页 */
#endingScreen { background: #0a0a0f; }
.ending-card { background: #111118; border: 1px solid #2a2a4e; border-radius: 20px; padding: 40px 30px; text-align: center; max-width: 360px; width: 90%; }
.ending-emoji { font-size: 64px; margin-bottom: 16px; }
.ending-name { font-size: 22px; font-weight: bold; color: #ffd700; margin-bottom: 12px; }
.ending-desc { font-size: 14px; color: #999; line-height: 1.8; margin-bottom: 20px; }
.ending-rank { font-size: 14px; color: #666; margin-bottom: 30px; }
.ending-rank span { color: #ffd700; font-weight: bold; font-size: 18px; }
.restart-btn { padding: 14px 50px; font-size: 16px; background: linear-gradient(135deg, #ffd700, #ff8c00); color: #0a0a0f; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; transition: transform 0.2s; }

function selectGender(g) {
  gender = g;
  var btns = document.querySelectorAll(".gender-btn");
  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove("selected"); }
  if (g === "male") { btns[0].classList.add("selected"); }
  else { btns[1].classList.add("selected"); }
  document.getElementById("startBtn").style.display = "block";
}

function startGame() {
  heart = 100;
  round = 1;
  currentNode = "start";
  chatContainer.innerHTML = "";
  typingIndicator = document.getElementById("typingIndicator");
  document.getElementById("startScreen").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");
  document.getElementById("endingScreen").classList.remove("active");
  showNode(currentNode);
}

  if (!node) { return; }
  currentNode = nodeId;
  document.getElementById("roundDisplay").textContent = "第" + round + "幕";
  document.getElementById("heartDisplay").textContent = "\u2764\uFE0F 孝心值: " + heart;

  var messageDiv = document.createElement("div");
  messageDiv.className = "message mom";
  var bubbleDiv = document.createElement("div");
  bubbleDiv.className = "bubble";
  bubbleDiv.innerHTML = "<b>" + node.speaker + "</b><br>" + node.text;
  messageDiv.appendChild(bubbleDiv);
  chatContainer.appendChild(messageDiv);

  scrollToBottom();

  if (node.choices && node.choices.length > 0) {
    setTimeout(function() { showChoices(node.choices); }, 500);
  }
}

function showChoices(choices) {
  choicesContainer.innerHTML = "";
  for (var i = 0; i < choices.length; i++) {
    var btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = choices[i].text;
    btn.onclick = (function(choice) {
      return function() { selectChoice(choice); };
    })(choices[i]);
    choicesContainer.appendChild(btn);
  }
}

function selectChoice(choice) {
  var effect = choice.effect || "";
  if (effect.indexOf("heart+=") >= 0) {
    heart += parseInt(effect.split("heart+=")[1]);
  } else if (effect.indexOf("heart-=") >= 0) {
    heart += parseInt(effect.split("heart-=")[1]);
  }

  var messageDiv = document.createElement("div");
  messageDiv.className = "message me";
  var bubbleDiv = document.createElement("div");
  bubbleDiv.className = "bubble";
  bubbleDiv.textContent = choice.text;
  messageDiv.appendChild(bubbleDiv);
  chatContainer.appendChild(messageDiv);

  choicesContainer.innerHTML = "";
  round++;
  document.getElementById("roundDisplay").textContent = "第" + round + "幕";
  document.getElementById("heartDisplay").textContent = "\u2764\uFE0F 孝心值: " + heart;

  scrollToBottom();

  if (story[choice.next]) {
    showTyping(function() { showNode(choice.next); });
  } else if (endings[choice.next]) {
    showTyping(function() { showEnding(choice.next); });
  }
}

function showTyping(callback) {
  var typing = document.createElement("div");
  typing.className = "typing-indicator";
  typing.style.display = "flex";
  typing.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  chatContainer.appendChild(typing);
  scrollToBottom();
  setTimeout(function() {
    typing.remove();
    callback();
  }, 1500);
}

function scrollToBottom() {
  setTimeout(function() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
  }, 100);
}

function showEnding(endingId) {
  var ending = endings[endingId];
  document.getElementById("gameScreen").classList.remove("active");
  document.getElementById("endingScreen").classList.add("active");
  document.getElementById("endingEmoji").textContent = ending.emoji;
  document.getElementById("endingName").textContent = ending.name;
  document.getElementById("endingDesc").textContent = ending.desc;
  document.getElementById("endingRank").innerHTML = "击败了全国 <span>" + ending.rank + "</span> 的大学生";
}

function restartGame() {
  document.getElementById("endingScreen").classList.remove("active");
  document.getElementById("startScreen").classList.add("active");
  document.getElementById("startBtn").style.display = "none";
  var btns = document.querySelectorAll(".gender-btn");
  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove("selected"); }
}
</script>
</body>
</html>
