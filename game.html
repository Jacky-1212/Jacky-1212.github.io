<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>晚上 11:47，你妈发来一条消息</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0b0b0f;
    --panel: #13131a;
    --bubble-left: #1e1e2e;
    --bubble-right: #2d1f14;
    --accent: #c9a96e;
    --text: #e0e0e0;
    --text-dim: #888;
    --danger: #e05555;
    --success: #4caf50;
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid #1a1a25;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c9a96e, #8b6f3a);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .header-info .name { font-size: 15px; font-weight: 500; }
  .header-info .status { font-size: 11px; color: var(--text-dim); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }
  .heart-badge {
    background: #1e1e2e;
    padding: 4px 10px;
    border-radius: 12px;
    color: var(--accent);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Chat Area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    padding-bottom: 200px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .timestamp {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin: 8px 0;
  }

  .message {
    display: flex;
    gap: 8px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }
  .message.mom { align-self: flex-start; }
  .message.me { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .message.mom .msg-avatar { background: linear-gradient(135deg, #c9a96e, #8b6f3a); }
  .message.me .msg-avatar { background: linear-gradient(135deg, #4a6fa5, #2d4a7a); }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    position: relative;
  }
  .message.mom .bubble {
    background: var(--bubble-left);
    border-bottom-left-radius: 4px;
  }
  .message.me .bubble {
    background: var(--bubble-right);
    border-bottom-right-radius: 4px;
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--bubble-left);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
    animation: fadeIn 0.3s ease;
  }
  .typing-indicator span {
    width: 6px; height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  /* Choices */
  .choices-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 12px;
    padding: 0 4px;
    animation: fadeIn 0.4s ease;
  }
  .choice-btn {
    background: #1a1a28;
    border: 1px solid #2a2a3a;
    color: var(--text);
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    font-family: inherit;
  }
  .choice-btn:hover {
    background: #222235;
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .choice-btn:active {
    transform: scale(0.98);
  }

  /* Bottom Stats Panel */
  .stats-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--panel);
    border-top: 1px solid #1a1a25;
    padding: 12px 16px;
    display: flex;
    justify-content: space-around;
    z-index: 100;
  }
  .stat-item {
    text-align: center;
  }
  .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Overlay & End Card */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.active { display: flex; }

  .end-card {
    background: var(--panel);
    border: 1px solid #2a2a3a;
    border-radius: 20px;
    padding: 32px 24px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .end-card .emoji { font-size: 48px; margin-bottom: 12px; }
  .end-card .title {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .end-card .desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.8;
    margin-bottom: 16px;
  }
  .end-card .rank {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 20px;
  }
  .end-card .rank span { color: var(--accent); font-weight: 700; }

  .btn-restart {
    background: linear-gradient(135deg, var(--accent), #8b6f3a);
    border: none;
    color: #fff;
    padding: 12px 32px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.2s;
    font-family: inherit;
  }
  .btn-restart:hover { transform: scale(1.05); }

  /* Start Screen */
  .start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
  }
  .start-screen .big-emoji { font-size: 64px; margin-bottom: 16px; }
  .start-screen h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .start-screen .subtitle {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .start-screen .tagline {
    font-size: 12px;
    color: #555;
    margin-bottom: 32px;
  }
  .btn-start {
    background: linear-gradient(135deg, var(--accent), #8b6f3a);
    border: none;
    color: #fff;
    padding: 14px 48px;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.2s;
    font-family: inherit;
  }
  .btn-start:hover { transform: scale(1.05); }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-4px); }
  }

  /* Scrollbar */
  .chat-container::-webkit-scrollbar { width: 4px; }
  .chat-container::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }
</style>
</head>
<body>

<!-- Start Screen -->
<div class="start-screen" id="startScreen">
  <div class="big-emoji">📱</div>
  <h1>晚上 11:47</h1>
  <p class="subtitle">你妈发来一条消息</p>
  <p class="tagline">每一个大学生都经历过的深夜拷问</p>
  <button class="btn-start" onclick="startGame()">开始挑战</button>
</div>

<!-- Game Screen -->
<div id="gameScreen" style="display:none; flex:1; display:none; flex-direction:column;">
  <div class="header">
    <div class="header-left">
      <div class="avatar">👩</div>
      <div class="header-info">
        <div class="name">母后大人</div>
        <div class="status" id="statusText">在线</div>
      </div>
    </div>
    <div class="header-right">
      <div class="heart-badge">❤️ <span id="heartValue">100</span></div>
      <div style="color:var(--text-dim); font-size:12px;">第 <span id="stageNum">1</span> 幕</div>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="timestamp" id="timestamp"></div>
  </div>

  <div class="stats-panel">
    <div class="stat-item">
      <div class="stat-value" id="statPlayers">286,149</div>
      <div class="stat-label">今日挑战</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statRate">1.7%</div>
      <div class="stat-label">通关率</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statStage">第2关</div>
      <div class="stat-label">平均翻车</div>
    </div>
  </div>
</div>

<!-- End Overlay -->
<div class="overlay" id="endOverlay">
  <div class="end-card">
    <div class="emoji" id="endEmoji"></div>
    <div class="title" id="endTitle"></div>
    <div class="desc" id="endDesc"></div>
    <div class="rank" id="endRank"></div>
    <button class="btn-restart" onclick="restartGame()">再来一次</button>
  </div>
</div>

<script>
// ============ GAME DATA ============
const story = {
  start: {
    speaker: "mom",
    text: "还没睡？",
    choices: [
      { text: "睡了睡了，正准备关灯呢", next: "s1a", heart: 10 },
      { text: "还没呢，刚从图书馆回来", next: "s1b", heart: 5 },
      { text: "假装没看到，把手机扣过去", next: "s1c", heart: -20 }
    ]
  },
  s1a: {
    speaker: "mom",
    text: "哦哦那你快睡，明天早八别迟到",
    choices: [
      { text: "够的妈，我省着花呢", next: "end_a", heart: 15 },
      { text: "嗯……其实这个月有点紧", next: "end_b", heart: -5 },
      { text: "够！但我想要个新键盘🎮", next: "end_c", heart: -10 }
    ]
  },
  s1b: {
    speaker: "mom",
    text: "这么晚才回来？食堂还开着吗？",
    choices: [
      { text: "吃了吃了，在食堂吃的挺好", next: "end_d", heart: 10 },
      { text: "还没吃……食堂早关了", next: "end_e", heart: -15 },
      { text: "妈我跟你说，今天我们老师……", next: "end_f", heart: 5 }
    ]
  },
  s1c: {
    speaker: "mom",
    text: "？？？",
    extra: "我知道你没睡",
    extra2: "你室友刚发朋友圈说你在打游戏",
    choices: [
      { text: "妈我错了！我刚准备回您！", next: "end_g", heart: -30 },
      { text: "可能是手机被盗号了？", next: "end_h", heart: -50 },
      { text: "对不起妈，我在赶论文", next: "end_i", heart: 5 }
    ]
  }
};

const endings = {
  end_a: {
    emoji: "🏆",
    title: "妈宝の自我修养",
    desc: "你属于那种"妈我一切都好"的顶级乖孩子。\n即使银行卡余额只剩两位数，你也会说"够花"。",
    rank: 92,
    heart: 90
  },
  end_b: {
    emoji: "😅",
    title: "穷鬼的尊严",
    desc: "你嘴上说够，但眼神已经在要钱了。\n妈妈秒懂，第二天转账记录多了500块。",
    rank: 78,
    heart: 70
  },
  end_c: {
    emoji: "🎮",
    title: "得寸进尺型室友",
    desc: ""省着花"的意思就是"省下来买机械键盘"。\n妈妈沉默了三秒，回了一句"你先睡吧"。",
    rank: 65,
    heart: 60
  },
  end_d: {
    emoji: "🍜",
    title: "报喜不报忧冠军",
    desc: ""食堂挺好"——今天第三顿泡面，你面不改色。\n你妈如果来学校看你，人设当场崩塌。",
    rank: 85,
    heart: 80
  },
  end_e: {
    emoji: "🤡",
    title: "深夜饿鬼实录",
    desc: "全校食堂关门时间你倒背如流。\n此刻你正在纠结：是点外卖还是啃室友的饼干。",
    rank: 55,
    heart: 55
  },
  end_f: {
    emoji: "🎓",
    title: "转移话题大师",
    desc: "你成功用"今天我们老师讲课超搞笑"转移了话题。\n妈妈忘了问生活费，但你也忘了说想她。",
    rank: 72,
    heart: 75
  },
  end_g: {
    emoji: "🙇",
    title: "当场逮捕",
    desc: "你室友发朋友圈"今晚开黑五连坐"，你妈秒截图发你。\n你解释了半小时，最后还是被要求"以后早点睡"。",
    rank: 42,
    heart: 40
  },
  end_h: {
    emoji: "🌟",
    title: "嘴硬之王（隐藏）",
    desc: ""手机被盗号了"——你妈回了一句：\n"那你发张小时候穿开裆裤的照片证明一下身份。"\n隐藏成就解锁：母后の终极审判",
    rank: 8,
    heart: 10
  },
  end_i: {
    emoji: "💔",
    title: "深夜坦白局",
    desc: ""妈，我在赶论文。"\n电话那头沉默了两秒，然后传来："那你先忙，记得吃点东西。"\n你突然有点想家。",
    rank: 48,
    heart: 45
  }
};

// ============ GAME STATE ============
let state = {
  heart: 100,
  stage: 1,
  currentNode: "start",
  history: [],
  isEnded: false
};

// ============ DOM ============
const $chat = document.getElementById("chatContainer");
const $heart = document.getElementById("heartValue");
const $stage = document.getElementById("stageNum");
const $timestamp = document.getElementById("timestamp");
const $status = document.getElementById("statusText");
const $endOverlay = document.getElementById("endOverlay");

// ============ FUNCTIONS ============
function startGame() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "flex";
  document.getElementById("gameScreen").style.flexDirection = "column";
  $timestamp.textContent = "23:47";
  renderNode("start");
}

function renderNode(nodeId) {
  const node = story[nodeId];
  if (!node) return;

  state.currentNode = nodeId;
  $stage.textContent = state.stage;

  // Show typing indicator
  $status.textContent = "对方正在输入…";
  const typingEl = document.createElement("div");
  typingEl.className = "message mom";
  typingEl.innerHTML = `
    <div class="msg-avatar">👩</div>
    <div class="typing-indicator">
      <span></span><span></span><span></span>
    </div>
  `;
  $chat.appendChild(typingEl);
  scrollToBottom();

  // After delay, show message
  setTimeout(() => {
    typingEl.remove();
    $status.textContent = "在线";

    // Mom's message
    addMessage("mom", node.text);

    // Extra lines for dramatic effect (s1c has 3 messages)
    if (node.extra) {
      setTimeout(() => {
        addMessage("mom", node.extra);
      }, 600);
    }
    if (node.extra2) {
      setTimeout(() => {
        addMessage("mom", node.extra2);
      }, 1200);
    }

    // Show choices after messages
    const choiceDelay = node.extra2 ? 1800 : node.extra ? 1200 : 600;
    setTimeout(() => {
      showChoices(node.choices);
    }, choiceDelay);

  }, 1000);
}

function addMessage(who, text) {
  const msgEl = document.createElement("div");
  msgEl.className = `message ${who}`;
  msgEl.innerHTML = `
    <div class="msg-avatar">${who === "mom" ? "👩" : "🙋"}</div>
    <div class="bubble">${text}</div>
  `;
  $chat.appendChild(msgEl);
  scrollToBottom();
}

function showChoices(choices) {
  const container = document.createElement("div");
  container.className = "choices-container";

  choices.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = `${["①","②","③"][i]} ${c.text}`;
    btn.onclick = () => handleChoice(c);
    container.appendChild(btn);
  });

  $chat.appendChild(container);
  scrollToBottom();
}

function handleChoice(choice) {
  // Add player message
  addMessage("me", choice.text);

  // Update state
  state.heart += choice.heart;
  if (state.heart > 100) state.heart = 100;
  if (state.heart < 0) state.heart = 0;
  $heart.textContent = state.heart;
  state.stage++;
  $stage.textContent = state.stage;

  // Remove choices
  const existing = $chat.querySelector(".choices-container");
  if (existing) existing.remove();

  // Check if ending
  if (choice.next.startsWith("end_")) {
    setTimeout(() => showEnding(choice.next), 800);
  } else {
    setTimeout(() => renderNode(choice.next), 800);
  }
}

function showEnding(endId) {
  state.isEnded = true;
  const end = endings[endId];
  if (!end) return;

  // Vibrate if supported
  if (navigator.vibrate) navigator.vibrate(30);

  document.getElementById("endEmoji").textContent = end.emoji;
  document.getElementById("endTitle").textContent = end.title;
  document.getElementById("endDesc").textContent = end.desc;
  document.getElementById("endRank").innerHTML = `击败了全国 <span>${end.rank}%</span> 的大学生`;

  $endOverlay.classList.add("active");
}

function restartGame() {
  state = { heart: 100, stage: 1, currentNode: "start", history: [], isEnded: false };
  $heart.textContent = 100;
  $stage.textContent = 1;
  $chat.innerHTML = "";
  $endOverlay.classList.remove("active");
  renderNode("start");
}

function scrollToBottom() {
  setTimeout(() => {
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
  }, 50);
}

// Randomize stats on load
window.addEventListener("DOMContentLoaded", () => {
  const base = 286149;
  const rnd = base + Math.floor(Math.random() * 10000 - 5000);
  document.getElementById("statPlayers").textContent = rnd.toLocaleString();
});
</script>
</body>
</html>
