<div class="chat-area" id="chatArea"></div>

<div class="choices-container" id="currentChoices"></div>

<div class="intro-overlay" id="introOverlay">
    <h2 style="font-weight:600; color:#444;">深夜，宿舍熄灯了...</h2>
    <p style="color:#666; font-size:14px;">妈妈发来了一条微信，你该怎么回？
    <div class="gender-btns">
        <div class="g-btn" id="btnMale">
            <div class="icon">👦</div>
            <div>男</div>
        </div>
        <div class="g-btn" id="btnFemale">
            <div class="icon">👧</div>
            <div>女</div>
        </div>
    </div>
    <button class="start-btn" id="startBtn">开始对话</button>
</div>

<div class="ending-overlay hidden" id="endingOverlay">
    <div class="ending-card" id="endingCard">
        <!-- 结局内容由JS生成 -->
    </div>
</div>
</div>

<script>
(function() {
    // 状态变量
    var heart = 100, round = 1, currentNode = 'r1', isProcessing = false, gender = null;
    var chatArea = document.getElementById('chatArea'), heartNum = document.getElementById('heartNum');
    var roundNum = document.getElementById('roundNum'), choicesContainer = document.getElementById('currentChoices');
    var introOverlay = document.getElementById('introOverlay'), endingOverlay = document.getElementById('endingOverlay');
    var btnMale = document.getElementById('btnMale'), btnFemale = document.getElementById('btnFemale');
    var startBtn = document.getElementById('startBtn');

    // 获取节点文本（处理多行）
    function getNodeText(node) {
        if (!node.text) return '';
        return Array.isArray(node.text) ? node.text.join('') : node.text;
    }

    // 更新顶部栏
    function updateTopbar() {
        heartNum.textContent = heart; roundNum.textContent = round;
        heartNum.style.color = (heart >= 100) ? '#333' : '#ff4757';
    }

    // 添加飘字动画
    function showHeartFloat(diff) {
        var float = document.createElement('div');
        float.className = 'heart-float ' + (diff > 0 ? 'plus' : 'minus');
        float.textContent = (diff > 0 ? '+' : '') + diff + ' ❤️';
        float.style.left = (Math.random() * 60 + 20) + '%';
        float.style.top = (Math.random() * 20 + 40) + '%';
        document.body.appendChild(float);
        setTimeout(function() { float.remove(); }, 1000);
    }

    // 添加气泡
    function addBubble(speaker, text, isPlayer) {
        var bubble = document.createElement('div');
        bubble.className = 'bubble ' + (isPlayer ? 'bubble-me' : 'bubble-mom');
        bubble.innerHTML = '<strong>' + speaker + ':</strong>' + text.replace(/\n/g, '');
        chatArea.appendChild(bubble);
        scrollToBottom();
        return bubble;
    }

    // 添加内心OS
    function addInnerOS(osText) {
        var os = document.createElement('div');
        os.className = 'os-text'; os.textContent = osText;
        chatArea.appendChild(os); scrollToBottom();
    }

    // 打字机效果占位符
    function addTypingBubble() {
        var typing = document.createElement('div');
        typing.className = 'typing-bubble';
        typing.id = 'typingIndicator';
        typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div> 对方正在输入...';
        chatArea.appendChild(typing); scrollToBottom();
    }
    function removeTypingBubble() {
        var typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    // 移除选项
    function removeChoices() {
        var old = document.getElementById('currentChoices');
        if (old) old.remove();
    }

    // 滚动到底部
    function scrollToBottom() {
        setTimeout(function() { chatArea.scrollTop = chatArea.scrollHeight; }, 50);
    }

    // 获取当前节点的选项
    function getChoicesForNode(node) {
        if (gender === 'male' && node.choicesMale) return node.choicesMale;
        if (gender === 'female' && node.choicesFemale) return node.choicesFemale;
        return node.choices || [];
    }

    // 核心选择处理函数
    function handleChoiceClick(index, choices) {
        if (isProcessing) return; isProcessing = true;
        var choice = choices[index];
        
        addBubble('我', choice.text, true); removeChoices();

        if (typeof choice.heartChange !== 'undefined') {
            var oldHeart = heart; heart += choice.heartChange;
            if (heart < 0) heart = 0; if (heart > 200) heart = 200;
            if (heart !== oldHeart) showHeartFloat(heart - oldHeart);
        }
        updateTopbar();

        if (choice.isEnding) {
            var finalEndingId;
            if (choice.genderEnding) finalEndingId = getGenderEnding(choice.genderEnding);
            else finalEndingId = choice.nextNode;
            setTimeout(function() {
                showEnding(finalEndingId); isProcessing = false;
            }, 1400);
            return;
        }

        setTimeout(function() {
            addTypingBubble();
            setTimeout(function() {
                removeTypingBubble(); processNode(choice.nextNode);
                isProcessing = false;
            }, 1700);
        }, 450);
    }

    // 处理节点
    function processNode(nodeId) {
        currentNode = nodeId; round += 1;
        var node = storyNodes[nodeId];
        if (!node) { console.error('Node not found: ' + nodeId); isProcessing = false; return; }
        
        var nodeText = getNodeText(node);
        addBubble(node.speaker, nodeText, false);
        if (node.os) setTimeout(function() { addInnerOS(node.os); }, 350);
        
        updateTopbar();
        var choices = getChoicesForNode(node);
        setTimeout(function() { renderChoices(choices); }, 520);
    }

    // 渲染选项
    function renderChoices(choices) {
        removeChoices();
        var container = document.createElement('div');
        container.className = 'choices-container'; container.id = 'currentChoices';
        for (var i = 0; i < choices.length; i++) {
            var btn = document.createElement('button');
            btn.className = 'choice-btn'; btn.textContent = choices[i].text;
            btn.setAttribute('data-index', i);
            (function(idx, chArr) {
                btn.addEventListener('click', function() {
                    if (isProcessing) return; handleChoiceClick(idx, chArr);
                });
            })(i, choices);
            container.appendChild(btn);
        }
        chatArea.appendChild(container); scrollToBottom();
    }

    // 结局判定
    function getGenderEnding(key) {
        if (gender === 'male') return {
            'giveup': 'ending_giveup', 'cotton': 'ending_cotton',
            'earphone': 'ending_male1', 'skincare': 'ending_male2',
            'keyboard': 'ending_male3', 'coat': 'ending_male4'
        }[key];
        else return {
            'giveup': 'ending_giveup', 'cotton': 'ending_cotton',
            'earphone': 'ending_female1', 'skincare': 'ending_female2',
            'keyboard': 'ending_female3', 'coat': 'ending_female4'
        }[key];
    }

    function showEnding(endingId) {
        var ending = endings[endingId] || endings['ending_giveup'];
        updateTopbar();
        var html = '';
        html += '<div class="ending-emoji">' + ending.emoji + '</div>';
        html += '<div class="ending-name">' + ending.name + '</div>';
        html += '<div class="ending-desc">' + ending.desc + '</div>';
        html += '<div class="ending-rank">击败了全国 ' + ending.rank + ' 的大学生</div>';
        html += '<button class="replay-btn" id="replayBtn">再来一次</button>';
        endingCard.innerHTML = html; endingOverlay.classList.remove('hidden');
        setTimeout(function() {
            var replayBtn = document.getElementById('replayBtn');
            if (replayBtn) replayBtn.addEventListener('click', resetGame);
        }, 130);
        scrollToBottom();
    }

    // 重置游戏
    function resetGame() {
        heart = 100; round = 1; currentNode = 'r1'; isProcessing = false; gender = null;
        updateTopbar(); chatArea.innerHTML = ''; endingOverlay.classList.add('hidden');
        endingCard.innerHTML = ''; introOverlay.classList.remove('hidden');
        btnMale.classList.remove('selected'); btnFemale.classList.remove('selected');
        startBtn.classList.remove('visible'); chatArea.scrollTop = 0;
    }

    function startGame() {
        if (!gender) return;
        introOverlay.classList.add('hidden'); chatArea.innerHTML = '';
        heart = 100; round = 1; currentNode = 'r1'; isProcessing = false;
        updateTopbar(); processNode('r1');
    }

    // 开局按钮事件
    btnMale.addEventListener('click', function() {
        if (isProcessing && gender) return;
        gender = 'male'; btnMale.classList.add('selected'); btnFemale.classList.remove('selected');
        startBtn.classList.add('visible');
    });
    btnFemale.addEventListener('click', function() {
        if (isProcessing && gender) return;
        gender = 'female'; btnFemale.classList.add('selected'); btnMale.classList.remove('selected');
        startBtn.classList.add('visible');
    });
    startBtn.addEventListener('click', function() {
        if (!gender) return; if (startBtn.classList.contains('visible')) startGame();
    });

    // ==================== 剧情节点数据 ====================
    var storyNodes = {};

    // r1: 开局
    storyNodes['r1'] = {
        speaker: "📱 妈妈", text: "儿子/闺女，睡了吗？\n刚才整理房间看到你的体检报告，视力那栏好像不太乐观。别老熬夜玩手机啊。",
        os: "这么晚还找我，肯定没好事……",
        choices: [
            { text: "还没呢，马上睡", nextNode: "r2a" },
            { text: "困死了，先睡了哈", nextNode: "r2b" },
            { text: "怎么了妈？", nextNode: "r2c" }
        ]
    };

    // r2a: 妈追问
    storyNodes['r2a'] = {
        speaker: "👩 母后大人", text: "别装睡。我看你朋友圈昨晚两点还在点赞，到底在干嘛？",
        os: "啧，被抓包了……", choices: [
            { text: "在想毕业以后的事", nextNode: "r3c" },
            { text: "在刷招聘信息，看看实习", nextNode: "r3d" },
            { text: "跟室友开黑呢", nextNode: "r3b" }
        ]
    };
    // r2b: 妈追问
    storyNodes['r2b'] = {
        speaker: "👩 母后大人", text: "行了别装。妈不是不懂你们年轻人，但身体要紧。到底在干嘛？",
        os: "这语气……看来是发现了什么。", choices: [
            { text: "在想毕业以后的事", nextNode: "r3c" },
            { text: "在刷招聘信息，看看实习", nextNode: "r3d" },
            { text: "跟室友开黑呢", nextNode: "r3b" }
        ]
    };
    // r2c: 妈追问
    storyNodes['r2c'] = {
        speaker: "👩 母后大人", text: "妈跟你说话呢。别以为装睡就能躲过去。",
        os: "她怎么这么执着……", choices: [
            { text: "在想毕业以后的事", nextNode: "r3c" },
            { text: "在刷招聘信息，看看实习", nextNode: "r3d" },
            { text: "跟室友开黑呢", nextNode: "r3b" }
        ]
    };

    // r3a: 妈问吃饭
    storyNodes['r3a'] = {
        speaker: "👩 母后大人", genderChoices: true, text: "最近吃饭怎么样？别老吃外卖。",
        os: "糟糕，她怎么知道我昨晚点外卖了……", choicesMale: [
            { text: "挺好的，食堂随便吃吃", nextNode: "r4" },
            { text: "偶尔跟室友出去撸串", nextNode: "r4" },
            { text: "凑合过吧……月底了嘛", nextNode: "r4" }
        ], choicesFemale: [
            { text: "挺好的，跟室友搭伙做饭", nextNode: "r4" },
            { text: "偶尔喝杯奶茶就当一顿了", nextNode: "r4" },
            { text: "凑合过吧……月底了嘛", nextNode: "r4" }
        ]
    };
    // r3b: 妈说在打游戏/玩
    storyNodes['r3b'] = {
        speaker: "👩 母后大人", genderChoices: true, text: "我就知道你又在玩。最近课业不忙吗？论文项目都搞完了？",
        os: "完了完了，被抓现行了……", choicesMale: [
            { text: "都搞完了，您放心", nextNode: "r4" },
            { text: "还差个论文没写完……", nextNode: "r4" },
            { text: "明天再说，不急", nextNode: "r4" }
        ], choicesFemale: [
            { text: "都搞完了，您放心", nextNode: "r4" },
            { text: "还差个报告没写完……", nextNode: "r4" },
            { text: "明天再说，不急", nextNode: "r4" }
        ]
    };
    // r3c: 妈追问"想什么呢"
    storyNodes['r3c'] = {
        speaker: "👩 母后大人", genderChoices: true, text: "想什么呢？跟妈说说。",
        os: "她居然没骂我，有点意外……", choicesMale: [
            { text: "在想毕业以后的事", nextNode: "r4" },
            { text: "在想周末要不要跟同学出去玩", nextNode: "r4" },
            { text: "没什么，就是有点累", nextNode: "r4" }
        ], choicesFemale: [
            { text: "在想毕业以后的事", nextNode: "r4" },
            { text: "在想周末要不要跟同学去逛街", nextNode: "r4" },
            { text: "没什么，就是有点累", nextNode: "r4" }
        ]
    };
    // r3d: 刷招聘/聊天 → 妈妈温和回应，避免重复问实习
    storyNodes['r3d'] = {
        speaker: "👩 母后大人", text: "哦，那挺好的。别太累了就行。",
        os: "她今天怎么这么温柔……", choices: [
            { text: "嗯嗯，我知道啦", nextNode: "r4" },
            { text: "妈您也是，早点休息", nextNode: "r4", heartChange: 3 },
            { text: "还行吧，不算累", nextNode: "r4" }
        ]
    };

    // r4: 实习话题（统一为实习）
    storyNodes['r4'] = {
        speaker: "👩 母后大人", text: "对了，你实习找得怎么样了？",
        os: "她怎么突然转到这个话题了……", choices: [
            { text: "投了几家了，等消息呢", nextNode: "r5" },
            { text: "在准备了，就是有点迷茫", nextNode: "r5" },
            { text: "妈您别急，我心里有数", nextNode: "r5", heartChange: 5 }
        ]
    };

    // r5: 过渡到钱
    storyNodes['r5'] = {
        speaker: "👩 母后大人", text: "嗯，你自己有数就行，我也不想天天催你。……对了，你最近生活费还够花吗？手头怎么样？",
        os: "等等，她怎么突然问到钱上了？", choices: [
            { text: "挺好的，够花", nextNode: "r6a" },
            { text: "还行吧，就是实习面试要花钱", nextNode: "r6b" },
            { text: "妈，您怎么突然问这个", nextNode: "r6c" }
        ]
    };

    // r6a: 够花 -> 质疑
    storyNodes['r6a'] = {
        speaker: "👩 母后大人", text: "够花就好。不过我看你上个月好像取了不少现金？是不是谈恋爱请客了？",
        os: "她怎么连这都知道？！", choices: [
            { text: "哪有，就是买点资料", nextNode: "r7a" },
            { text: "偶尔请请同学，这很正常吧", nextNode: "r7a" },
            { text: "妈，您查我银行卡？", nextNode: "r7b" }
        ]
    };
    // r6b: 要花钱 -> 质疑
    storyNodes['r6b'] = {
        speaker: "👩 母后大人", text: "面试要不了几个钱。我看你支付宝账单，最近给游戏充了不少值吧？",
        os: "这都能看出来？她是侦探吗？", choices: [
            { text: "那是帮室友代练的", nextNode: "r7a" },
            { text: "偶尔放松一下嘛", nextNode: "r7a" },
            { text: "妈，您怎么什么都管", nextNode: "r7b" }
        ]
    };
    // r6c: 敏感 -> 直球
    storyNodes['r6c'] = {
        speaker: "👩 母后大人", text: "妈就是关心你。最近行情不好，工作难找，别委屈了自己。钱不够跟妈说。",
        os: "这话听着……怎么有点像是在激我？", choices: [
            { text: "知道啦，我挺好的", nextNode: "r7a" },
            { text: "其实……真有点紧", nextNode: "r7c" },
            { text: "您怎么突然这么大方？", nextNode: "r7b" }
        ]
    };

    // r7a: 否认 -> 威胁
    storyNodes['r7a'] = {
        speaker: "👩 母后大人", text: "最好是这样。妈可告诉你，现在骗子多，别乱借钱给人，也别乱投资。听到了吗？",
        os: "典型的转移话题……她肯定不信我。", choices: [
            { text: "知道了，您烦不烦", nextNode: "ending_giveup", isEnding: true },
            { text: "知道了妈，别念了", nextNode: "ending_giveup", isEnding: true, heartChange: -5 },
            { text: "妈，您就这么不相信我？", nextNode: "ending_cotton", isEnding: true }
        ]
    };
    // r7b: 反感 -> 威胁
    storyNodes['r7b'] = {
        speaker: "👩 母后大人", text: "我是你妈！我不管你谁管你？你现在是翅膀硬了，敢跟妈顶嘴了？",
        os: "完了，火气上来了……", choices: [
            { text: "对不起妈，我错了", nextNode: "ending_giveup", isEnding: true },
            { text: "您别生气，我不说了", nextNode: "ending_giveup", isEnding: true, heartChange: -5 },
            { text: "妈，您就这么不相信我？", nextNode: "ending_cotton", isEnding: true }
        ]
    };

    // 【重点修改】r7c: 坦白局
    storyNodes['r7c'] = {
        speaker: "👩 母后大人", text: "紧什么紧？你是不是在外面欠了钱？跟妈说实话，借了多少？",
        os: "完了，被看穿了……", choices: [
            // 原有的承认选项，扣除相应孝心值并显示飘字
            { text: "就几百块……我自己能还", nextNode: "ending_gender1", isEnding: true, genderEnding: 'earphone_or_skincare', heartChange: -8 },
            { text: "一千出头……妈您别告诉我爸", nextNode: "ending_gender1", isEnding: true, genderEnding: 'earphone_or_skincare', heartChange: -15 },
            { text: "我也不知道欠了多少，没敢算", nextNode: "ending_gender1", isEnding: true, genderEnding: 'earphone_or_skincare', heartChange: -20 },
            
            // 【修改】：将原 r7d 的温柔回应移到这里作为选项 B
            // 选择此项孝心值不变，触发“贴心小棉袄”好结局
            { text: "妈，您就这么不相信我？", nextNode: "ending_cotton", isEnding: true }
        ]
    };

    // ==================== 结局数据 ====================
    var endings = {
        ending_giveup: {
            emoji: "😶‍🌫️", name: "冷战的开始", rank: "45%",
            desc: "妈妈叹了口气，没再说什么。你看着手机屏幕，心里五味杂陈。也许她真的是为你好，但这种被监控的感觉让你喘不过气。这一关，你选择了对抗。"
        },
        ending_cotton: {
            emoji: "🧸", name: "妈妈的贴心小棉袄", rank: "88%",
            desc: "听到你的反问，妈妈愣了一下，语气软了下来：“傻孩子，妈不是不信你，是当妈的忍不住操心。你要是真缺钱就跟我说，别硬撑。”你们冰释前嫌，她在你的心里永远是那个最温暖的依靠。"
        },
        ending_male1: {
            emoji: "🎧", name: "实用主义理工男", rank: "60%",
            desc: "既然坦白从宽，那就用行动证明。妈妈给你转了钱，还额外塞给你一副降噪耳机，让你“好好学习，少听那些乱七八糟的”。你收下了，心里却觉得有点沉甸甸的。"
        },
        ending_female1: {
            emoji: "💄", name: "精致护肤达人", rank: "60%",
            desc: "妈妈一边念叨你乱花钱，一边给你下单了一套昂贵的护肤品。“女孩子家家要注意形象，但也别太省了。”你看着购物车里的东西，无奈地笑了笑。"
        },
        ending_male2: {
            emoji: "⌨️", name: "电竞宅男的妥协", rank: "55%",
            desc: "为了填补窟窿，妈妈给你买了新的机械键盘，条件是你必须每周给她发一次成绩单。你答应了，从此过上了半工半读、敲代码抵债的生活。"
        },
        ending_female2: {
            emoji: "🧥", name: "时尚穿搭博主", rank: "55%",
            desc: "妈妈给你转了账，还发来了一个购物链接：“男朋友/女朋友送的？不行，妈也得给你准备一份。这件大衣看着不错，买回去相亲穿。”你看着余额，欲哭无泪。"
        }
    };

    // 初始化
    function init() {
        updateTopbar(); chatArea.innerHTML = '';
        introOverlay.classList.remove('hidden');
        endingOverlay.classList.add('hidden');
        btnMale.classList.remove('selected'); btnFemale.classList.remove('selected');
        startBtn.classList.remove('visible');
        gender = null; heart = 100; round = 1;
        currentNode = 'r1'; isProcessing = false;
    }
    init();
    document.addEventListener('touchmove
