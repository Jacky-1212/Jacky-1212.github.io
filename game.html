  var startButtons = document.querySelectorAll(".gender-btn");
  var startBtn = document.querySelector(".start-btn");
  var startScreen = document.querySelector(".start-screen");
  var gameScreen = document.querySelector(".game-screen");
  var chatWrap = document.querySelector(".chat-wrap");
  var osText = document.querySelector(".os-text");
  var actions = document.querySelector(".actions");
  var heartLabel = document.querySelector(".heart");
  var roundLabel = document.querySelector(".round");
  var overlay = document.querySelector(".overlay");
  var endingEmoji = document.querySelector(".ending-emoji");
  var endingName = document.querySelector(".ending-name");
  var endingDesc = document.querySelector(".ending-desc");
  var endingRank = document.querySelector(".rank");
  var restartBtn = document.querySelector(".restart-btn");
  function updateTopBar() {
    heartLabel.textContent = "❤️ 孝心值: " + heart;
    roundLabel.textContent = "第" + round + "幕";
  }
  function getNode(nodeId) {
    var node = nodes[nodeId];
    if (!node) {
      return null;
    }
    var result = {
      speaker: node.speaker,
      text: node.text,
      os: node.os
    };
    if (node.textMale) {
      result.text = gender === "male" ? node.textMale : node.textFemale;
    }
    if (node.optionsMale) {
      result.options = gender === "male" ? node.optionsMale : node.optionsFemale;
    } else {
      result.options = node.options;
    }
    return result;
  }
  function addMessage(type, text) {
    messageHistory.push({ type: type, text: text });
  }
  function renderMessages() {
    chatWrap.innerHTML = "";
    for (var i = 0; i < messageHistory.length; i++) {
      var item = messageHistory[i];
      var line = document.createElement("div");
      line.className = "message " + item.type;
      var bubble = document.createElement("div");
      bubble.className = "bubble";
      if (item.type === "typing") {
        line.className = "message mom typing";
      }
      bubble.textContent = item.text;
      line.appendChild(bubble);
      chatWrap.appendChild(line);
    }
    chatWrap.scrollTop = chatWrap.scrollHeight;
  }
  function renderOptions(options) {
    actions.innerHTML = "";
    if (!options || !options.length) {
      return;
    }
    for (var i = 0; i < options.length; i++) {
      var option = options[i];
      var button = document.createElement("button");
      button.type = "button";
      button.className = "option-btn";
      button.textContent = option.text;
      button.disabled = isWaiting;
      (function(opt, btn) {
        btn.addEventListener("click", function() {
          handleOptionClick(opt, btn);
        });
      })(option, button);
      actions.appendChild(button);
    }
  }
  function showNode(nodeId) {
    var node = getNode(nodeId);
    if (!node) {
      return;
    }
    addMessage("mom", node.text);
    renderMessages();
    osText.textContent = node.os || "";
    renderOptions(node.options);
  }
  function disableButtons() {
    var buttons = actions.querySelectorAll("button");
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].disabled = true;
    }
  }
  function handleOptionClick(option) {
    if (isWaiting) {
      return;
    }
    isWaiting = true;
    round += 1;
    if (option.heartChange) {
      heart += option.heartChange;
    }
    updateTopBar();
    addMessage("player", option.text);
    renderMessages();
    addMessage("typing", "...");
    renderMessages();
    disableButtons();
    setTimeout(function() {
      if (messageHistory.length && messageHistory[messageHistory.length - 1].type === "typing") {
        messageHistory.pop();
      }
      renderMessages();
      if (option.nextNode.indexOf("ending_") === 0) {
        showEnding(option.nextNode);
      } else {
        currentNode = option.nextNode;
        var nextNode = getNode(currentNode);
        if (nextNode) {
          addMessage("mom", nextNode.text);
          renderMessages();
          osText.textContent = nextNode.os || "";
          renderOptions(nextNode.options);
        }
      }
      isWaiting = false;
    }, 1500);

    endingDesc.textContent = ending.desc;
    endingRank.textContent = "击败了全国 " + ending.rank + " 的大学生";
    overlay.style.display = "flex";
  }
  function resetGame() {
    overlay.style.display = "none";

    gameScreen.style.display = "none";
    messageHistory = [];
    currentNode = "r1";
    heart = 100;
    round = 1;
    isWaiting = false;
    updateTopBar();
    osText.textContent = "";
    actions.innerHTML = "";
  }
  function startGame() {
    startScreen.style.display = "none";
    gameScreen.style.display = "flex";
    messageHistory = [];
    currentNode = "r1";
    heart = 100;
    round = 1;
    isWaiting = false;
    updateTopBar();
    osText.textContent = "";
    showNode(currentNode);
  }
  function setGenderValue(value, button) {
    gender = value;
    for (var i = 0; i < startButtons.length; i++) {
      startButtons[i].classList.remove("active");
    }
    button.classList.add("active");
    startBtn.style.display = "inline-flex";
  }
  for (var i = 0; i < startButtons.length; i++) {
    (function(btn) {
      btn.addEventListener("click", function() {
        setGenderValue(btn.getAttribute("data-gender"), btn);
      });
    })(startButtons[i]);
  }
  startBtn.addEventListener("click", startGame);
  restartBtn.addEventListener("click", resetGame);
  updateTopBar();
</script>
</body>
</html>
