<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深夜对话框 · 小树洞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            max-width: 550px;
            width: 100%;
            background: #16213e;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .chat-box {
            background: #0f3460;
            border-radius: 16px;
            padding: 24px;
            min-height: 180px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .chat-text {
            color: #e0e0e0;
            font-size: 17px;
            line-height: 1.8;
            white-space: pre-line;
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .choice-btn {
            background: #1a3a6b;
            color: #c0d0e0;
            border: 1px solid #2a4a7b;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .choice-btn:hover {
            background: #e94560;
            color: white;
            border-color: #e94560;
            transform: translateX(4px);
        }

        .restart-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .restart-btn:hover {
            background: #c73650;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h2 {
            color: #e94560;
            font-size: 18px;
        }

        .header span {
            color: #888;
            font-size: 13px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 13px;
            text-decoration: none;
        }

        .back-link:hover {
            color: #e94560;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <h2>💬 深夜对话框</h2>
        <span>小树洞 · 互动故事</span>
    </div>

    <div class="chat-box">
        <div class="chat-text" id="storyText">加载中...</div>
    </div>

    <div class="choices" id="choicesContainer"></div>

    <a href="https://jacky-1212.github.io" class="back-link">← 回到小树洞</a>
</div>

<script>
    // ========== 剧本 ==========
    const story = {
        start: {
            text: "晚上11:47，你刚写完作业躺在床上刷手机。\n微信突然弹出一条消息——\n\n妈妈：「还没睡？」",
            choices: [
                { text: "回：「睡了，正准备睡」", next: "sleepReply" },
                { text: "回：「没呢，刚写完作业」", next: "honestReply" },
                { text: "假装没看到，把手机扣过去", next: "ignoreReply" }
            ]
        },

        sleepReply: {
            text: "妈妈秒回：「那快睡吧，别老熬夜。」\n\n你回了个「嗯嗯」的表情包。\n放下手机，却盯着天花板发呆。\n其实你刚打开了下周的课件……",
            choices: [
                { text: "算了，真的睡吧", next: "reallySleep" },
                { text: "再看一页PPT就睡", next: "oneMorePage" }
            ]
        },

        honestReply: {
            text: "「没呢，刚写完作业。」\n\n妈妈：「那你也早点休息，别太累了。」\n\n你看了看时间——\n你这边晚上11:47，国内是中午12:47。\n她应该在午休，却还在惦记你有没有睡。",
            choices: [
                { text: "问她吃饭了没", next: "askFood" },
                { text: "说「知道了，你也是」", next: "sayOk" }
            ]
        },

        ignoreReply: {
            text: "手机又震了一下。\n\n妈妈：「？」\n\n过了十秒：\n「是不是嫌妈烦了？」\n\n你叹了口气，拿起手机。",
            choices: [
                { text: "回：「没嫌你烦，刚在想事情」", next: "notAnnoyed" },
                { text: "发一个猫猫表情包糊弄过去", next: "catMeme" }
            ]
        },

        reallySleep: {
            text: "你真的闭上了眼睛。\n\n但脑海里全是明天due的清单、下周的quiz、还有那个还没开始的小组项目……\n\n---\n🎬 结局：身体睡了，脑子没睡",
            choices: []
        },

        oneMorePage: {
            text: "你打开了课件。\n\n再抬头的时候，已经是凌晨1:23。\nPPT看完了，但心里空落落的。\n\n---\n🎬 结局：又熬过了一个普通的夜晚",
            choices: []
        },

        askFood: {
            text: "「你中午吃饭了没？」\n\n妈妈：「吃了，给你爸煲了汤。你那边冷不冷？要不要寄点厚衣服过去？」\n\n你鼻子突然有点酸。\n她总是这样，明明在聊吃饭，最后总会绕回你身上。",
            choices: [
                { text: "说「不用寄，我自己能买」", next: "noNeed" },
                { text: "说「好啊，寄点冬衣过来」", next: "yesSend" }
            ]
        },

        sayOk: {
            text: "你回了句「知道了，你也是」。\n\n妈妈回了个微笑表情。\n\n第二天早上，你发现她凌晨1点发了条朋友圈：\n「孩子长大了，知道让我也早睡了」\n配图是你小学时候的照片。\n\n---\n🎬 结局：她也想你了，只是没说",
            choices: []
        },

        notAnnoyed: {
            text: "「没嫌你烦，刚在想事情。」\n\n「想啥呢？」\n\n你沉默了一会儿，打字：\n「……想家了。」\n\n那边沉默了十几秒。\n\n然后弹出一句：\n「嗯，妈也想你。快了，放假就回来了。」\n\n---\n🎬 结局：隔着屏幕的一句真心话",
            choices: []
        },

        catMeme: {
            text: "你发了一张猫猫打滚的表情包。\n\n妈妈回了个「乖」字。\n\n糊弄过去了。\n\n但你知道，下次视频的时候，她一定会问：\n「上次半夜不睡觉，到底在忙啥？」\n\n---\n🎬 结局：逃得过今晚，逃不过周末的视频电话",
            choices: []
        },

        noNeed: {
            text: "「不用寄，我自己能买。」\n\n妈妈：「那你自己照顾好自己，别省钱，多吃点好的。」\n\n你回了个「好」。\n\n放下手机，你翻了翻淘宝，把一件加绒卫衣加入了购物车。\n但没下单。\n\n---\n🎬 结局：嘴上说着不用，心里还是想要的",
            choices: []
        },

        yesSend: {
            text: "「好啊，寄点冬衣过来。」\n\n妈妈立刻精神了：「那我把你那件蓝色羽绒服找出来，还有你爸那件冲锋衣你要不要？」\n\n你笑了，回了个「都要」。\n\n那一晚，你睡得比平时踏实。\n\n---\n🎬 结局：一件来自国内的包裹，比暖气还暖",
            choices: []
        }
    };

    // ========== 游戏引擎 ==========
    let currentScene = 'start';

    function goTo(sceneId) {
        currentScene = sceneId;
        const scene = story[sceneId];
        if (!scene) return;

        document.getElementById('storyText').innerText = scene.text;

        const container = document.getElementById('choicesContainer');
        container.innerHTML = '';

        if (scene.choices && scene.choices.length > 0) {
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = choice.text;
                btn.onclick = () => goTo(choice.next);
                container.appendChild(btn);
            });
        } else {
            const restartBtn = document.createElement('button');
            restartBtn.className = 'restart-btn';
            restartBtn.innerText = '🔄 再玩一次';
            restartBtn.onclick = () => goTo('start');
            container.appendChild(restartBtn);
        }
    }

    // 启动游戏
    goTo('start');
</script>

</body>
</html>
